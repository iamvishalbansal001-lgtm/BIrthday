<!DOCTYPE html>

<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Someone Special ❤️</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.4/gsap.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    height: 100vh;
    touch-action: manipulation;
    background: linear-gradient(135deg, #f9a8d4, #f3e8ff);
}

#app {
    position: relative;
    width: 100%;
    height: 100%;
    overflow: hidden;
}

#content {
    position: relative;
    z-index: 10;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 20px;
    box-sizing: border-box;
}

.step {
    position: absolute;
    width: 100%;
    max-width: 800px;
    padding: 40px;
    background: rgba(255, 255, 255, 0.509);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    text-align: center;
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    pointer-events: none;
}

.step.active {
    opacity: 1;
    transform: translateY(0);
    pointer-events: all;
}

.btn {
    background: linear-gradient(135deg, #ec4899, #f43f5e);
    color: white;
    border: none;
    padding: 12px 24px;
    border-radius: 50px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 20px;
    box-shadow: 0 4px 15px rgba(236, 72, 153, 0.3);
    transition: all 0.3s ease;
}

.btn:hover {
    transform: translateY(-2px);
}

.text-gradient {
    background: linear-gradient(135deg, #ec4899, #f43f5e, #f59e0b);
    -webkit-background-clip: text;
    color: transparent;
}

#progress-container {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 80%;
    max-width: 400px;
    height: 6px;
    background: rgba(255, 255, 255, 0.3);
    border-radius: 3px;
    z-index: 100;
}

#progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #ec4899, #f43f5e);
    border-radius: 3px;
    transition: width 0.5s ease;
}

#canvas-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
}
</style>

</head>

<body>

<div id="app">
<div id="canvas-container"></div>

<div id="progress-container">
<div id="progress-bar"></div>
</div>

<p style="position:fixed; top:50px; text-align:center; width:100%; font-size:12px; color:#555;">
Just a little journey for you…
</p>

<div id="content">

<div class="step active" id="step1">
<h1 class="text-4xl font-bold text-gradient">Hey Janvi ❤️</h1>
<p>I made something special for you...</p>
<button class="btn" id="start-btn">Open Slowly ❤️</button>
</div>

<div class="step" id="step2">
<h2 class="text-3xl text-gradient">Happy Birthday Janvi ❤️</h2>
<p>You are amazing.</p>
<button class="btn" id="next-btn-2">Next</button>
</div>

<div class="step" id="step3">
<h2 class="text-3xl text-gradient">Why you're special</h2>
<p>Your smile, your kindness, everything.</p>
<button class="btn" id="next-btn-3">Next</button>
</div>

<div class="step" id="step4">
<img src="main.jpg" style="width:100%; border-radius:20px;">
<p>I don’t know when… but you became my favorite person.</p>
<button class="btn" id="next-btn-4">Wait… there’s more 👀</button>
</div>

<div class="step" id="step5">
<h2>Something I made for you 🎧</h2>
<audio controls style="width:100%;">
<source src="rap.mp3">
</audio>
<button class="btn" id="next-btn-5">One Last Thing</button>
</div>

<div class="step" id="step6">
<h2>Happy Birthday ❤️</h2>
<button class="btn" id="confetti-btn">Celebrate 🎉</button>
</div>

</div>
</div>

<script>
let currentStep = 1;
const totalSteps = 6;

function updateProgressBar(){
document.getElementById('progress-bar').style.width=((currentStep-1)/(totalSteps-1))*100+'%';
}

function showStep(n){
document.querySelectorAll('.step').forEach(s=>s.classList.remove('active'));
document.getElementById('step'+n).classList.add('active');
updateProgressBar();
}

document.getElementById('start-btn').onclick=()=>{currentStep=2;showStep(2);}
document.getElementById('next-btn-2').onclick=()=>{currentStep=3;showStep(3);}
document.getElementById('next-btn-3').onclick=()=>{currentStep=4;showStep(4);}
document.getElementById('next-btn-4').onclick=()=>{currentStep=5;showStep(5);}
document.getElementById('next-btn-5').onclick=()=>{currentStep=6;showStep(6);}

document.getElementById('confetti-btn').onclick=()=>{
confetti({particleCount:150,spread:70});
};

updateProgressBar();
</script>

</body>
</html>
